{% extends "base.html" %}

{% block content %}
<div class="dashboard-grid-3col">
    <!-- Left Column: Crypto Panel -->
    <div class="glass-card fade-in delay-1">
        <div class="card-header">
            <h2 class="card-title">
                <i class="fa-solid fa-coins" style="color: var(--accent-primary);"></i>
                Market Overview
            </h2>
            <div class="htmx-indicator spinner" id="crypto-spinner"></div>
        </div>

        <div class="table-container poll-container" hx-get="/partials/crypto" hx-trigger="every 30s, refresh"
            hx-swap="innerHTML" hx-indicator="#crypto-spinner">
            {% include "partials/crypto_table.html" %}
        </div>
    </div>

    <!-- Center Column: Advanced Chart & News -->
    <div class="center-column fade-in delay-2">
        <div class="glass-card chart-card">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fa-solid fa-chart-line" style="color: var(--accent-secondary);"></i>
                    Technical Analysis
                </h2>
            </div>
            <!-- TradingView Advanced Chart -->
            <div class="tradingview-widget-container" style="height: 400px; width: 100%;">
                <div id="tradingview_chart" style="height: 100%; width: 100%;"></div>
                <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
                <script type="text/javascript">
                    function loadChart(symbol, type) {
                        let tvSymbol = "BINANCE:BTCUSDT"; // Default
                        if (type === 'crypto') {
                            tvSymbol = symbol === 'USDT' ? 'CRYPTO:USDTUSD' : 'BINANCE:' + symbol + 'USDT';
                        } else if (type === 'fiat') {
                            tvSymbol = 'FX_IDC:' + symbol + 'USD';
                        } else if (type === 'metal') {
                            tvSymbol = 'OANDA:' + symbol + 'USD';
                        }

                        document.getElementById('tradingview_chart').innerHTML = '';
                        new TradingView.widget({
                            "autosize": true,
                            "symbol": tvSymbol,
                            "interval": "D",
                            "timezone": "Etc/UTC",
                            "theme": "dark",
                            "style": "1",
                            "locale": "en",
                            "enable_publishing": false,
                            "backgroundColor": "rgba(30, 41, 59, 0)",
                            "gridColor": "rgba(255, 255, 255, 0.06)",
                            "hide_top_toolbar": false,
                            "hide_legend": false,
                            "save_image": false,
                            "container_id": "tradingview_chart"
                        });
                    }
                    // Initial load
                    loadChart("BTC", "crypto");
                </script>
            </div>
        </div>

        <div class="glass-card news-card mt-4">
            <div class="card-header">
                <h2 class="card-title">
                    <i class="fa-regular fa-newspaper" style="color: var(--text-muted);"></i>
                    Market News
                </h2>
            </div>
            <!-- TradingView Timeline Widget -->
            <div class="tradingview-widget-container" style="height: 400px; width: 100%;">
                <div class="tradingview-widget-container__widget" style="height: 100%; width: 100%;"></div>
                <script type="text/javascript"
                    src="https://s3.tradingview.com/external-embedding/embed-widget-timeline.js" async>
                        {
                            "feedMode": "all_symbols",
                                "colorTheme": "dark",
                                    "isTransparent": true,
                                        "displayMode": "regular",
                                            "width": "100%",
                                                "height": "100%",
                                                    "locale": "en"
                        }
                    </script>
            </div>
        </div>
    </div>

    <!-- Right Column: Football Panel -->
    <div class="glass-card fade-in delay-3">
        <div class="card-header">
            <h2 class="card-title">
                <i class="fa-solid fa-futbol" style="color: var(--success);"></i>
                Football Scores
                <select id="competition-select" class="competition-select" hx-get="/partials/football/"
                    hx-include="[name='competition_code']" hx-trigger="change" hx-target="#football-table-container"
                    hx-indicator="#football-spinner"
                    onchange="this.setAttribute('hx-get', '/partials/football/' + this.value)">
                    <option value="WC" selected>World Cup</option>
                    <option value="PL">Premier League</option>
                    <option value="PD">La Liga</option>
                    <option value="CL">Champions League</option>
                </select>
            </h2>
            <div class="htmx-indicator spinner" id="football-spinner"></div>
        </div>

        <div id="football-table-container" class="table-container poll-container" hx-get="/partials/football/WC"
            hx-trigger="every 60s, refresh" hx-swap="innerHTML" hx-indicator="#football-spinner">
            {% include "partials/football_table.html" %}
        </div>
    </div>
</div>
{% endblock %}

version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: crypto_user
      POSTGRES_PASSWORD: crypto_password
      POSTGRES_DB: crypto_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U crypto_user -d crypto_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build: .
    command: crypto-wc-api
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://crypto_user:crypto_password@db:5432/crypto_db
      # Add other environment variables here or via .env file
    depends_on:
      db:
        condition: service_healthy

  bot:
    build: .
    command: crypto-wc-bot
    environment:
      - DATABASE_URL=postgresql+asyncpg://crypto_user:crypto_password@db:5432/crypto_db
      # TELEGRAM_BOT_TOKEN must be set via .env
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
